    <!-- 🖱️ ПОДСВЕЧИВАНИЕ КУРСОРА -->
<div class="cursor-glow" id="cursorGlow"></div>

<script>
    const cursorGlow = document.getElementById('cursorGlow');
    
    // Плавное движение за курсором
    let mouseX = 0, mouseY = 0;
    let glowX = 0, glowY = 0;
    
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });
    
    function animateGlow() {
        // Плавная задержка (lerp)
        glowX += (mouseX - glowX) * 0.1;
        glowY += (mouseY - glowY) * 0.1;
        
        cursorGlow.style.left = glowX + 'px';
        cursorGlow.style.top = glowY + 'px';
        
        requestAnimationFrame(animateGlow);
    }
    
    animateGlow();
    
    // Эффект при клике
    document.addEventListener('click', () => {
        cursorGlow.style.opacity = '0.8';
        setTimeout(() => {
            cursorGlow.style.opacity = '0.6';
        }, 200);
    });
    
    // Усиление при наведении на ссылки
    const links = document.querySelectorAll('a, button, .nav-link, .quick-card, .contact-card');
    links.forEach(link => {
        link.addEventListener('mouseenter', () => {
            cursorGlow.style.opacity = '0.9';
            cursorGlow.style.transform = 'translate(-50%, -50%) scale(1.2)';
        });
        link.addEventListener('mouseleave', () => {
            cursorGlow.style.opacity = '0.6';
            cursorGlow.style.transform = 'translate(-50%, -50%) scale(1)';
        });
    });
</script>
